<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIMUS Engraving Order Form</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background:#f5f7fb;
  color:#1b2430;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo-box{
  width:60px;
  height:60px;
  margin:auto;
  border-radius:16px;
  background:linear-gradient(135deg,#0f172a,#1f2937);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:24px;
}

h1{
  text-align:center;
  margin:10px 0 20px;
  font-size:22px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

label{
  display:block;
  margin-top:12px;
  font-size:14px;
  font-weight:600;
}

input, textarea, select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
}

textarea{
  min-height:80px;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.copy{background:#facc15;}
.msg{background:#2563eb;color:#fff;}
.sms{background:#16a34a;color:#fff;}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>
<div class="container">

<div class="logo">
<div class="logo-box">P</div>
</div>

<h1>PRIMUS Engraving “Order Form”</h1>

<div class="card">

<label>Name</label>
<input id="name">

<label>Contact Number</label>
<input id="contact">

<label>Product / Package</label>
<input id="product">

<label>Quantity</label>
<input id="qty">

<label>Text to Engrave</label>
<textarea id="engrave"></textarea>

<label>With Logo or Image?</label>
<select id="logo">
<option></option>
<option>Yes</option>
<option>No</option>
</select>

<label>Date of Event / Pick-up</label>
<input id="date">

<button class="copy" onclick="copyOrder()">Copy Order</button>
<button class="msg" onclick="openMessenger()">Open Messenger</button>
<button class="sms" onclick="sendSMS()">Send via SMS</button>

<div class="footer">
PRIMUS Engraving Order Form
</div>

</div>
</div>

<script>
const phone="639612468852";
const messenger="https://m.me/primusengraving";

function build(){
return `PRIMUS ORDER

Name:${name.value}
Contact:${contact.value}
Product:${product.value}
Qty:${qty.value}
Text:${engrave.value}
Logo:${logo.value}
Date:${date.value}`;
}

function copyOrder(){
navigator.clipboard.writeText(build());
alert("Copied. Paste in Messenger.");
}

function openMessenger(){
copyOrder();
window.open(messenger);
}

function sendSMS(){
location.href=`sms:${phone}?body=${encodeURIComponent(build())}`;
}
</script>

</body>
</html>
